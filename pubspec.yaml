name: watchnext
description: "Shared movie & TV recommender for two-person households."
publish_to: 'none'
version: 0.4.82+87

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  cloud_functions: ^6.0.3
  firebase_messaging: ^16.1.3
  google_sign_in: ^6.2.1

  # State / routing
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.7

  # Networking
  http: ^1.2.1

  # Storage
  shared_preferences: ^2.5.5

  # Deep links (future: invite links)
  app_links: ^6.3.3

  # Share-to-Save (Phase 4) — receives SEND/text intents from Android share sheet
  receive_sharing_intent: ^1.8.1

  # Trakt OAuth browser flow (Phase 2)
  flutter_web_auth_2: ^4.1.0

  # Utilities
  intl: ^0.19.0
  package_info_plus: ^9.0.1
  url_launcher: ^6.3.2

  # In-window YouTube trailer player on title detail
  youtube_player_flutter: ^9.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  fake_cloud_firestore: ^4.1.0
  firebase_auth_mocks: ^0.15.1
  mockito: ^5.4.4

flutter:
  uses-material-design: true
